    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">

                    <li class="nav-item">

                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h1 class="text-center mb-4"><i class="bi bi-envelope-fill me-2"></i>Liên Hệ</h1>
        <div class="row">
            <div class="col-md-6">
                <h3><i class="bi bi-telephone-fill me-2"></i>Thông Tin Liên Hệ</h3>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item"><strong>Điện thoại:</strong> 0906.076.177</li>
                    <li class="list-group-item"><strong>Email:</strong> ngothien0604@gmail.com</li>
                    <li class="list-group-item"><strong>Địa chỉ:</strong> Đường số 8, P. Long Phước, Hồ Chí Minh</li>

            <div class="col-md-6">
                <h3><i class="bi bi-chat-dots-fill me-2"></i>Gửi Tin Nhắn</h3>
                <form>
                    <div class="mb-3">
                        <label for="name" class="form-label">Tên</label>
                        <input type="text" class="form-control" id="name" placeholder="Nhập tên của bạn">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="Nhập email của bạn">
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Tin nhắn</label>
                        <textarea class="form-control" id="message" rows="4" placeholder="Nhập tin nhắn của bạn"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Gửi</button>
                </form>
            </div>
        </div>
